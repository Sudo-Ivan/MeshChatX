services:
    reticulum-meshchatx:
        container_name: reticulum-meshchatx
        image: ${MESHCHAT_IMAGE:-git.quad4.io/rns-things/meshchatx:latest}
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        ports:
            - 127.0.0.1:8000:8000
        volumes:
            - ./meshchat-config:/config
