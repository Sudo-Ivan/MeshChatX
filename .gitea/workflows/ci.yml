name: CI

on:
    push:
        branches:
            - "*"
    pull_request:
        branches:
            - master
            - dev
    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  git config --global credential.helper "!f() { echo username=x-access-token; echo password=${GITEA_TOKEN}; }; f"
                  git init -q && git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Setup Poetry
              run: pip install poetry
            - name: Setup Python environment
              run: task setup:be
            - name: pip-audit
              run: |
                  poetry run pip install --upgrade "pip>=26.0" pip-audit
                  poetry run pip-audit
            - name: Install Node dependencies
              run: task deps:fe
            - name: pnpm audit
              run: pnpm audit --audit-level=high
            - name: Lint
              run: |
                  set -o pipefail
                  task lint:all 2>&1 | tee lint_results.txt

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  git config --global credential.helper "!f() { echo username=x-access-token; echo password=${GITEA_TOKEN}; }; f"
                  git init -q && git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Install dependencies
              run: task deps:fe
            - name: pnpm audit
              run: pnpm audit --audit-level=high
            - name: Determine version
              id: version
              run: |
                  SHORT_SHA=$(git rev-parse --short HEAD)
                  echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
            - name: Build frontend
              run: |
                  set -o pipefail
                  task build:fe 2>&1 | tee build_results.txt
              env:
                  VITE_APP_VERSION: ${{ steps.version.outputs.version }}

    test-backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  git config --global credential.helper "!f() { echo username=x-access-token; echo password=${GITEA_TOKEN}; }; f"
                  git init -q && git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Compile backend
              run: |
                  set -o pipefail
                  task compile 2>&1 | tee compile_results.txt

    test-lang:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  git config --global credential.helper "!f() { echo username=x-access-token; echo password=${GITEA_TOKEN}; }; f"
                  git init -q && git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Setup Poetry
              run: pip install poetry
            - name: Install dependencies
              run: task install
            - name: pip-audit
              run: |
                  poetry run pip install --upgrade "pip>=26.0" pip-audit
                  poetry run pip-audit
            - name: pnpm audit
              run: pnpm audit --audit-level=high
            - name: Run language tests
              run: |
                  set -o pipefail
                  task test:lang 2>&1 | tee lang_results.txt
