name: Tests

on:
    push:
        branches:
            - "*"
    pull_request:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: https://git.quad4.io/actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

            - name: Setup Node.js
              uses: https://git.quad4.io/actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install pnpm
              run: corepack enable && corepack prepare pnpm@10.30.0 --activate

            - name: Setup Python
              uses: https://git.quad4.io/actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
              with:
                  python-version: "3.13"

            - name: Setup Task
              uses: https://git.quad4.io/actions/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1
              with:
                  version: "3.46.3"

            - name: Setup Poetry
              run: pip install poetry

            - name: Install dependencies
              run: task install

            - name: Run tests
              run: |
                  set -o pipefail
                  task test:all 2>&1 | tee test_results.txt
