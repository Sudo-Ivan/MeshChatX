name: Tests

on:
    push:
        branches:
            - "*"
    pull_request:
        branches:
            - master
            - dev
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  git config --global credential.helper "!f() { echo username=x-access-token; echo password=${GITEA_TOKEN}; }; f"
                  git init -q && git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD

            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24

            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh

            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13

            - name: Setup Task
              run: sh scripts/ci/setup-task.sh

            - name: Setup Poetry
              run: pip install poetry

            - name: Install dependencies
              run: task install

            - name: Run tests
              run: |
                  set -o pipefail
                  task test:all 2>&1 | tee test_results.txt
